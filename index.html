# Feliz-D-az-de-las-madres-
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día Mamá 💖</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body{
            background: linear-gradient(135deg,#ffb6d9,#ffd9ec,#fff0f7);
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .tarjeta{
            width: 95%;
            max-width: 520px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            padding: 30px;
            text-align: center;
            position: relative;
            z-index: 10;
            transform: scale(0.9);
            opacity: 0;
            animation: aparecer 1.5s forwards;
        }
        @keyframes aparecer{
            to{
                opacity: 1;
                transform: scale(1);
            }
        }
        .imagen{
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 15px;
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1{
            color: #ff4081;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(255, 64, 129, 0.2);
        }
        p{
            color: #555;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .autor{
            color: red;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .boton{
            background: linear-gradient(135deg,#ff4081,#f50057);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .boton:hover{
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 64, 129, 0.6);
        }
        .mensaje-oculto{
            margin-top: 20px;
            padding: 15px;
            background: #fff0f7;
            border-radius: 12px;
            color: #d81b60;
            font-weight: bold;
            display: none;
            animation: mostrar 0.8s forwards;
        }
        @keyframes mostrar{
            from{ opacity:0; transform: translateY(10px); }
            to{ opacity:1; transform: translateY(0); }
        }
        .corazon{
            position: absolute;
            color: #ff4081;
            font-size: 25px;
            animation: flotar 4s infinite ease-in-out;
            z-index: 1;
        }
        @keyframes flotar{
            0%,100%{ transform: translateY(0) rotate(0deg); opacity:1; }
            50%{ transform: translateY(-20px) rotate(15deg); opacity:0.7; }
        }
    </style>
</head>
<body>
    <div class="tarjeta">
        <!-- IMAGEN CON ENLACE DIRECTO -->
        <img src="https://i.imgur.com/zDiQyqI.png" alt="Imagen Pixel art" class="imagen">

        <div class="contenido">
            <h1>💖 Feliz Día Mamá 💖</h1>
            <p>
                Gracias por estar siempre conmigo,<br>
                por cuidarme y darme sobrado amor 🌸<br>
                Eres la mejor mamá del mundo.
            </p>
            <button class="boton" onclick="mostrarMensaje()">Presióname</button>
            <div class="mensaje-oculto" id="mensajeEspecial">
                ¡Te amo muchísimo! Gracias por todo lo que haces por mí 💖
            </div>
            <div class="autor">
                Para: Eliana Marcela Gomez Charis
            </div>
        </div>
    </div>

    <script>
        // Generar corazones flotantes
        function crearCorazones(){
            const cantidad = 15;
            const body = document.querySelector('body');
            for(let i=0; i<cantidad; i++){
                const corazon = document.createElement('div');
                corazon.classList.add('corazon');
                corazon.innerHTML = '💖';
                corazon.style.left = `${Math.random() * 100}%`;
                corazon.style.top = `${Math.random() * 100}%`;
                corazon.style.animationDelay = `${Math.random() * 4}s`;
                body.appendChild(corazon);
            }
        }
        crearCorazones();

        // Mostrar mensaje al presionar el botón
        function mostrarMensaje(){
            const mensaje = document.getElementById('mensajeEspecial');
            mensaje.style.display = mensaje.style.display === 'block' ? 'none' : 'block';
        }

        // Mostrar frases al tocar cualquier parte de la pantalla
        const frases = [
            "¡Te quiero mucho mamá! 💖",
            "Eres mi ejemplo a seguir ✨",
            "Gracias por tu paciencia y amor 🌸",
            "Mi vida es mejor gracias a ti 💖",
            "Eres única e irreemplazable 💝"
        ];
        document.addEventListener('click', (e) => {
            if(e.target.tagName !== 'BUTTON'){
                const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
                const texto = document.createElement('div');
                texto.style.position = 'absolute';
                texto.style.left = `${e.pageX}px`;
                texto.style.top = `${e.pageY}px`;
                texto.style.color = '#ff4081';
                texto.style.fontWeight = 'bold';
                texto.style.background = 'white';
                texto.style.padding = '5px 10px';
                texto.style.borderRadius = '8px';
                texto.style.boxShadow = '0 3px 8px rgba(0,0,0,0.15)';
                texto.textContent = fraseAleatoria;
                document.body.appendChild(texto);
                setTimeout(() => texto.remove(), 2500);
            }
        });
    </script>
</body>
</html>
